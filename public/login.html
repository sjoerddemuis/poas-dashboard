<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inloggen · POAS-dashboard</title>
<style>
:root{color-scheme:light}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF9F5;color:#0F1411;font-family:'Inter',system-ui,-apple-system,sans-serif}
.box{background:#fff;border:1px solid #E4E7E3;border-radius:14px;padding:30px 28px;width:340px;box-shadow:0 6px 30px rgba(0,0,0,.05)}
.kick{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;color:#00C030;text-transform:uppercase;font-weight:700}
h1{font-size:22px;margin:4px 0 18px}
label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;color:#6B726C;text-transform:uppercase;display:block;margin:12px 0 4px}
input{width:100%;padding:10px 12px;border:1px solid #E4E7E3;border-radius:8px;font-size:15px;outline:none}
input:focus{border-color:#00C030}
button{width:100%;margin-top:18px;padding:11px;border:none;border-radius:8px;background:#00C030;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{opacity:.6;cursor:default}
.err{color:#E5484D;font-size:13px;margin-top:12px;min-height:18px}
</style>
</head>
<body>
<div class="box">
  <div class="kick">Ongediertewinkel</div>
  <h1>POAS-dashboard</h1>
  <form id="f">
    <label>E-mail</label>
    <input id="email" type="email" autocomplete="username" required>
    <label>Wachtwoord</label>
    <input id="pw" type="password" autocomplete="current-password" required>
    <button id="btn" type="submit">Inloggen</button>
    <div class="err" id="err"></div>
  </form>
</div>
<script>
const f=document.getElementById("f"),err=document.getElementById("err"),btn=document.getElementById("btn");
f.onsubmit=async(e)=>{e.preventDefault();err.textContent="";btn.disabled=true;btn.textContent="Bezig…";
  try{const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:document.getElementById("email").value,password:document.getElementById("pw").value})});
    const d=await r.json();
    if(r.ok){location.href="/";}else{err.textContent=d.error||"Inloggen mislukt.";}
  }catch(e){err.textContent="Netwerkfout. Probeer opnieuw.";}
  btn.disabled=false;btn.textContent="Inloggen";
};
</script>
</body>
</html>
